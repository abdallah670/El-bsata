[build]
  base = "el-bsata-angular"
  command = "npm ci && npm install -g @angular/cli && ng build --configuration production"
  publish = "dist/el-bsata-angular/browser"

[build.environment]
  NODE_VERSION = "20"

# Redirect API calls to MonsterASP backend
[[redirects]]
  from = "/api/*"
  to = "https://elbsata.runasp.net/api/:splat"
  status = 200
  force = true

# Client-side routing — all paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-term cache for assets with content hash in filename
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache index.html (so new deploys are picked up instantly)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Short cache for favicon
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"